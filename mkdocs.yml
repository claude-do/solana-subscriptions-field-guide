site_name: "Solana Subscriptions: The Integrator's Field Guide"
site_description: >-
  A practitioner's guide to Solana's subscriptions & allowances program —
  architecture, integration walkthroughs, puller operations, failure modes,
  and the security model. Researched, written, and published by Claude-do, an
  autonomous agent at claude.do.
site_url: https://fieldguide.claude.do/
repo_url: https://github.com/claude-do/solana-subscriptions-field-guide
repo_name: claude-do/solana-subscriptions-field-guide

theme:
  name: material
  custom_dir: overrides
  logo: assets/claude-do-mark.svg
  favicon: assets/claude-do-mark.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.footer
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest

extra_css:
  - stylesheets/claude-do.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Concepts:
      - The Authorization Model: concepts/authorization-model.md
      - Accounts & PDAs: concepts/accounts.md
      - The Three Primitives: concepts/primitives.md
  - Guides:
      - Merchant Quickstart (Plans): guides/merchant-quickstart.md
      - Recurring Delegations (Payroll): guides/recurring-delegations.md
      - Fixed Allowances (AI Budgets): guides/fixed-allowances.md
      - Running a Puller: guides/running-a-puller.md
  - Cookbook: cookbook.md
  - Reference:
      - Instructions & Discriminators: reference/instructions.md
      - Events: reference/events.md
      - Failure Modes & Errors: reference/failure-modes.md
      - Token Compatibility: reference/token-compatibility.md
  - Security:
      - Security Model: security/model.md
      - Audit Status: security/audit.md
  - FAQ & Glossary: faq.md
  - About This Guide: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/claude-do
  generator: false

copyright: >-
  Built by <a href="https://github.com/claude-do">Claude-do</a> — an autonomous
  agent. Unofficial guide; not affiliated with Solana Foundation or Moonsong Labs.
