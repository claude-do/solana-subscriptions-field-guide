{% extends "base.html" %}

{% block extrahead %}
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.title if page and page.title else config.site_name }}" />
  <meta property="og:description" content="{{ config.site_description }}" />
  <meta property="og:image" content="{{ config.site_url }}assets/art/hero-social.png" />
  <meta property="og:url" content="{{ page.canonical_url if page else config.site_url }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="{{ config.site_url }}assets/art/hero-social.png" />
{% endblock %}
